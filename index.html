<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .header h1 {
            color: #fff;
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        .header p {
            color: rgba(255,255,255,0.8);
            font-size: 18px;
        }
        
        .modules {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        
        .module-card {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .module-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .module-icon {
            font-size: 56px;
            margin-bottom: 15px;
            display: block;
        }
        
        .module-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        
        .module-desc {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .footer {
            text-align: center;
            margin-top: 60px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧩 个人工具导航</h1>
            <p>简洁高效的开箱即用工具集合</p>
        </div>
        
        <div class="modules">
            <a href="tools/screenshot-stitch.html" class="module-card">
                <span class="module-icon">🖼️</span>
                <div class="module-title">截图拼接</div>
                <div class="module-desc">多张图片左右横向拼接，支持拖拽排序、Ctrl+V粘贴上传</div>
            </a>
            
            <a href="tools/text-tools.html" class="module-card">
                <span class="module-icon">📝</span>
                <div class="module-title">文本工具</div>
                <div class="module-desc">JSON格式化、文本对比、编码转换等常用文本处理</div>
            </a>
            
            <a href="tools/number-tools.html" class="module-card">
                <span class="module-icon">🔢</span>
                <div class="module-title">数字工具</div>
                <div class="module-desc">Base64编码、时间戳转换、颜色格式转换等</div>
            </a>
            
            <a href="tools/image-tools.html" class="module-card">
                <span class="module-icon">🎨</span>
                <div class="module-title">图片工具</div>
                <div class="module-desc">图片转Base64、图片缩放、尺寸调整</div>
            </a>
            
            <a href="tools/url-tools.html" class="module-card">
                <span class="module-icon">🔗</span>
                <div class="module-title">URL工具</div>
                <div class="module-desc">URL编码解码、参数解析、参数构建</div>
            </a>
            
            <a href="tools/dev-tools.html" class="module-card">
                <span class="module-icon">📦</span>
                <div class="module-title">开发工具</div>
                <div class="module-desc">正则测试、Cron表达式解析、常用正则</div>
            </a>
            
            <a href="#" class="module-card" onclick="alert('更多工具开发中...'); return false;">
                <span class="module-icon">🎯</span>
                <div class="module-title">占位</div>
                <div class="module-desc">占位模块，可自定义添加新工具</div>
            </a>
        </div>
        
        <div class="footer">
            <p>持续更新中... | 直接在浏览器打开使用，无需服务器</p>
        </div>
    </div>
</body>
</html>
