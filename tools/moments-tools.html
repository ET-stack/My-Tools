<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朋友圈分享图片 - 九宫格/分栏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #4a90d9; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        
        .tool-section { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .tool-title { font-size: 18px; font-weight: 600; margin-bottom: 15px; color: #333; }
        
        .layout-options { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .layout-btn { padding: 10px 20px; border: 2px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .layout-btn.active { border-color: #4a90d9; background: #e8f4ff; color: #4a90d9; }
        
        .upload-grid { display: grid; gap: 8px; margin-bottom: 20px; }
        .upload-grid.col-2 { grid-template-columns: repeat(2, 1fr); }
        .upload-grid.col-3 { grid-template-columns: repeat(3, 1fr); }
        .upload-grid.col-4 { grid-template-columns: repeat(4, 1fr); }
        .upload-grid.col-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .upload-grid.col-9 { grid-template-columns: repeat(3, 1fr); }
        
        .upload-cell { 
            aspect-ratio: 1; 
            border: 2px dashed #ddd; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            background: #fafafa;
        }
        .upload-cell:hover { border-color: #4a90d9; background: #f0f7ff; }
        .upload-cell.has-image { border-style: solid; }
        .upload-cell img { width: 100%; height: 100%; object-fit: cover; }
        .upload-cell .placeholder { color: #999; font-size: 24px; }
        .upload-cell .delete-btn { 
            position: absolute; top: 5px; right: 5px; 
            background: rgba(0,0,0,0.6); color: #fff; 
            width: 24px; height: 24px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; opacity: 0; transition: opacity 0.2s;
        }
        .upload-cell:hover .delete-btn { opacity: 1; }
        
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .btn-primary { background: #4a90d9; color: #fff; }
        .btn-primary:hover { background: #3a7bc8; }
        .btn-success { background: #34c759; color: #fff; }
        .btn-success:hover { background: #2db14a; }
        
        .preview-section { text-align: center; }
        .preview-section img { max-width: 100%; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-link">← 返回导航</a>
        <h1>📱 朋友圈分享图片</h1>
        
        <div class="tool-section">
            <div class="tool-title">选择布局</div>
            <div class="layout-options">
                <button class="layout-btn active" data-cols="1">单图</button>
                <button class="layout-btn" data-cols="2">双图</button>
                <button class="layout-btn" data-cols="3">三图</button>
                <button class="layout-btn" data-cols="4">四图</button>
                <button class="layout-btn" data-cols="6">六宫格</button>
                <button class="layout-btn" data-cols="9">九宫格</button>
            </div>
        </div>
        
        <div class="tool-section">
            <div class="tool-title">上传图片</div>
            <div class="upload-grid col-1" id="uploadGrid"></div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="generateImage()">生成图片</button>
                <button class="btn btn-success" onclick="downloadImage()">下载图片</button>
                <button class="btn btn-primary" onclick="copyImage()">复制图片</button>
            </div>
        </div>
        
        <div class="tool-section preview-section">
            <div class="tool-title">预览</div>
            <div id="preview"></div>
        </div>
    </div>
    
    <input type="file" id="fileInput" accept="image/*" multiple>
    <div class="toast" id="toast"></div>
    
    <script>
        let currentLayout = 1;
        let images = {};
        let generatedCanvas = null;
        
        const layoutMap = { 1: 1, 2: 2, 3: 3, 4: 4, 6: 6, 9: 9 };
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        function renderGrid() {
            const grid = document.getElementById('uploadGrid');
            grid.className = `upload-grid col-${currentLayout}`;
            grid.innerHTML = '';
            
            for (let i = 0; i < layoutMap[currentLayout]; i++) {
                const cell = document.createElement('div');
                cell.className = 'upload-cell' + (images[i] ? ' has-image' : '');
                cell.innerHTML = images[i] 
                    ? `<img src="${images[i]}"><div class="delete-btn" data-index="${i}">×</div>`
                    : `<span class="placeholder">+</span>`;
                cell.onclick = (e) => {
                    if (!e.target.classList.contains('delete-btn')) {
                        selectImage(i);
                    }
                };
                grid.appendChild(cell);
            }
            
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    delete images[btn.dataset.index];
                    renderGrid();
                };
            });
        }
        
        document.querySelectorAll('.layout-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLayout = parseInt(btn.dataset.cols);
                images = {};
                renderGrid();
            };
        });
        
        let currentIndex = 0;
        function selectImage(index) {
            currentIndex = index;
            document.getElementById('fileInput').click();
        }
        
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    images[currentIndex] = ev.target.result;
                    renderGrid();
                    showToast('图片已添加');
                };
                reader.readAsDataURL(file);
            }
            e.target.value = '';
        });
        
        function generateImage() {
            const count = Object.keys(images).length;
            if (count === 0) { showToast('请至少上传一张图片'); return; }
            
            const cellSize = 400;
            const gap = 4;
            let cols, rows;
            
            if (currentLayout === 1) { cols = 1; rows = 1; }
            else if (currentLayout === 2) { cols = 2; rows = 1; }
            else if (currentLayout === 3) { cols = 3; rows = 1; }
            else if (currentLayout === 4) { cols = 2; rows = 2; }
            else if (currentLayout === 6) { cols = 3; rows = 2; }
            else if (currentLayout === 9) { cols = 3; rows = 3; }
            
            const canvas = document.createElement('canvas');
            canvas.width = cols * cellSize + (cols - 1) * gap;
            canvas.height = rows * cellSize + (rows - 1) * gap;
            
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            let idx = 0;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (images[idx]) {
                        const img = new Image();
                        img.onload = () => {
                            const x = c * (cellSize + gap);
                            const y = r * (cellSize + gap);
                            ctx.drawImage(img, x, y, cellSize, cellSize);
                            
                            if (r === rows - 1 && c === cols - 1) {
                                generatedCanvas = canvas;
                                document.getElementById('preview').innerHTML = `<img src="${canvas.toDataURL('image/png')}">`;
                                showToast('图片生成成功');
                            }
                        };
                        img.src = images[idx];
                    } else {
                        idx++;
                    }
                    idx++;
                }
            }
            
            setTimeout(() => {
                generatedCanvas = canvas;
                document.getElementById('preview').innerHTML = `<img src="${canvas.toDataURL('image/png')}">`;
            }, 100);
        }
        
        function downloadImage() {
            if (!generatedCanvas) { showToast('请先生成图片'); return; }
            const link = document.createElement('a');
            link.download = `朋友圈_${currentLayout}图_${Date.now()}.png`;
            link.href = generatedCanvas.toDataURL('image/png');
            link.click();
            showToast('图片已下载');
        }
        
        async function copyImage() {
            if (!generatedCanvas) { showToast('请先生成图片'); return; }
            try {
                generatedCanvas.toBlob(async (blob) => {
                    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                    showToast('图片已复制到剪贴板');
                });
            } catch (e) {
                showToast('复制失败，请重试');
            }
        }
        
        renderGrid();
    </script>
</body>
</html>
